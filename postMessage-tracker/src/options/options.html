<!DOCTYPE html>
<html>
<head></head>
<body>
	<div id="options">
		<fieldset>
			<legend>Webhook Options</legend>
			<input type="checkbox" id="webhook_messages" />
			<label for="webhook_messages">Send Messages</label>
			<input type="checkbox" id="webhook_listeners" />
			<label for="webhook_listeners">Send Listeners</label>
			<br>
			<br>
			<label for="webhook_url">Webhook URL</label>
			<input type="text" id="webhook_url" placeholder="http://127.0.0.1:31337" size="30" style="float: right" />
			<br>
			<label for="webhook_scope">Scope</label>
			<input type="text" id="webhook_scope" placeholder=".*" value=".*" size="30" style="float: right" />
		</fieldset>

		<fieldset>
			<legend>Listener Options</legend>
			<input type="checkbox" id="detectMessagePortListeners" />
			<label for="detectMessagePortListeners">Detect MessagePort Listeners</label>
			<br>
			<input type="checkbox" id="detectWorkerListeners" />
			<label for="detectWorkerListeners">Detect Worker Listeners</label>
			<br>
			<input type="checkbox" id="detectServiceWorkerListeners" />
			<label for="detectServiceWorkerListeners">Detect ServiceWorker Listeners</label>
			<br>
			<input type="checkbox" id="detectSharedWorkerListeners" />
			<label for="detectSharedWorkerListeners">Detect SharedWorker Listeners</label>
			<br>
			<input type="checkbox" id="detectBroadcastChannelListeners" />
			<label for="detectBroadcastChannelListeners">Detect BoadcastChannel Listeners</label>
			<br>
		</fieldset>

		<fieldset>
			<legend>Message Options</legend>
			<input type="checkbox" id="detectMessagePortMessages" />
			<label for="detectMessagePortMessages">Detect MessagePort Messages</label>
			<br>
			<input type="checkbox" id="detectWorkerMessages" />
			<label for="detectWorkerMessages">Detect Worker Messages</label>
			<br>
			<input type="checkbox" id="detectServiceWorkerMessages" />
			<label for="detectServiceWorkerMessages">Detect ServiceWorker Messages</label>
			<br>
			<input type="checkbox" id="detectSharedWorkerMessages" />
			<label for="detectSharedWorkerMessages">Detect SharedWorker Messages</label>
			<br>
			<input type="checkbox" id="detectBoadcastChannelMessages" />
			<label for="detectBoadcastChannelMessages">Detect BoadcastChannel Messages</label>
			<br>
			<input type="checkbox" id="detectBrowserStorageReflections" />
			<label for="detectBrowserStorageReflections">Match browser storage reflections</label>
			<br><br>
			<label for="messageMatchers">Message Matchers</label>
			<select id="messageMatchers" multiple style="width: 100%"></select>
			<br><br>
			<input id=patternInput type="text" style="width: 64%" placeholder="Regex pattern">
			<button id=addBtn>Add</button>
			<button id=rmvBtn>Remove</button>
		</fieldset>
		
		<button id="saveBtn">Save</button>
		
		<div id="statusMsg"></div>
	</div>
	<script src="js/main.js"></script>
</body>
</html>
